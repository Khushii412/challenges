<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>landing-page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="p1.jpeg" type="image/x-icon">
</head>
<body>

    <form class="glass" >
        <label for="name">Full Name</label>
        <input type=" text" id="name" placeholder="enter your name" class="lbl">

        <label for="contact">Contact Number</label>
        <input type="tel" id="contact" class="lbl" placeholder="1234567890">

        <label for="address">Address</label>
        <textarea name="address" id="Adda" class="lbl"></textarea>

        <label for="c_name">Company Name</label>
        <input type="text" id="c_name" class="lbl">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="abc@example.com" class="lbl">

        <label for="dept">Department</label>
        <select name="dept" id="dept" class="lbl">
            <option value="HR">HR</option>
            <option value="sales">Sales</option>
            <option value="development">Development</option>
            <option value="marketting">Marketting</option>
            <option value="other">Other</option>
        </select>

        <div class="gender">

        <label for="gender">Gender:</label>
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female">
        <label for="female">Female</label>
        <input type="radio" name="gender" id="other">
        <label for="other">Prefer not to say</label>
       
    </div>
        <input type="submit" value="SUBMIT" class="btn">
    </form>
</body>
</html>
